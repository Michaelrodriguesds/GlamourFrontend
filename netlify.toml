[build]
  command = """
    curl -sS https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.22.0-stable.tar.xz | tar -xJ -C /opt && \
    export PATH="$PATH:/opt/flutter/bin" && \
    flutter config --enable-web --no-analytics && \
    flutter pub get && \
    flutter build web --release
  """
  publish = "build/web"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200