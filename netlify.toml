[build]
  command = "flutter build web --release"
  publish = "build/web"

[build.environment]
  FLUTTER_VERSION = "3.22.0" # Use a versão mais recente estável

# Plugin oficial do Flutter para Netlify
[[plugins]]
  package = "@netlify/plugin-flutter"

# Redirecionamentos para SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200